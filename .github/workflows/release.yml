name: Build and Release Cluster Compiler

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Compiler Binary for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: cluster-v0.1-linux
          - os: windows-latest
            artifact_name: cluster-v0.1-windows.exe
          - os: macos-latest
            artifact_name: cluster-v0.1-macos

    steps:
      - name: Checkout Release Repository
        uses: actions/checkout@v4

      - name: Checkout Cluster Compiler Codebase
        uses: actions/checkout@v4
        with:
          repository: 'cl-andro/cluster-lang'
          token: ${{ secrets.CLUSTER_LANG_PAT }}
          path: 'cluster-lang-source'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller lark llvmlite

      - name: Build Standalone Compiler Binary
        shell: bash
        run: |
          cd cluster-lang-source
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --onefile --name ${{ matrix.artifact_name }} \
            --add-data "compiler${SEP}compiler" \
            --add-data "cluster_backend${SEP}cluster_backend" \
            --collect-all llvmlite \
            --hidden-import lark \
            run.py
          mv dist/${{ matrix.artifact_name }} ../${{ matrix.artifact_name }}


      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate Artifacts
        run: |
          mkdir release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -R release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'v0.1.0' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
