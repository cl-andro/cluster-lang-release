name: Build and Release Cluster Compiler

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Compiler Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Release Repository
        uses: actions/checkout@v4

      - name: Checkout Cluster Compiler Codebase
        uses: actions/checkout@v4
        with:
          repository: 'cl-andro/cluster-lang'
          token: ${{ secrets.CLUSTER_LANG_PAT }}
          path: 'cluster-lang-source'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller lark llvmlite

      - name: Build Standalone Compiler Binary
        run: |
          cd cluster-lang-source
          pyinstaller --onefile --name cluster-v0.1 run.py
          mv dist/cluster-v0.1 ../cluster-v0.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cluster-v0.1
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
