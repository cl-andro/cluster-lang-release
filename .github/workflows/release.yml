name: Build and Release Cluster Compiler

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.17.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Compiler Binary for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        include:
          - os: ubuntu-22.04
            platform: linux
            ext: ""
          - os: windows-latest
            platform: windows
            ext: ".exe"
          - os: macos-latest
            platform: macos
            ext: ""

    steps:
      - name: Checkout Release Repository
        uses: actions/checkout@v4

      - name: Checkout Cluster Compiler Codebase
        uses: actions/checkout@v4
        with:
          repository: 'cl-andro/cluster-lang'
          token: ${{ secrets.CLUSTER_LANG_PAT }}
          path: 'cluster-lang-source'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller lark llvmlite

      - name: Set Version and Binary Name
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              VERSION="${{ github.ref_name }}"
            else
              VERSION="v0.1.0"
            fi
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BINARY_NAME=cluster-${VERSION}-${{ matrix.platform }}${{ matrix.ext }}" >> $GITHUB_ENV

      - name: Build Standalone Compiler Binary
        shell: bash
        run: |
          cd cluster-lang-source
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --onefile --name ${{ env.BINARY_NAME }} \
            --add-data "compiler${SEP}compiler" \
            --add-data "cluster_backend${SEP}cluster_backend" \
            --collect-all llvmlite \
            --hidden-import lark \
            run.py
          mv dist/${{ env.BINARY_NAME }} ../${{ env.BINARY_NAME }}
          cd ..
          
          # Create a static version-agnostic copy
          STATIC_NAME="cluster-${{ matrix.platform }}${{ matrix.ext }}"
          cp ${{ env.BINARY_NAME }} ${STATIC_NAME}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: |
            ${{ env.BINARY_NAME }}
            cluster-${{ matrix.platform }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate Artifacts
        run: |
          mkdir release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -R release-files

      - name: Set Version Tag
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              VERSION="${{ github.ref_name }}"
            else
              VERSION="v0.1.0"
            fi
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          tag_name: ${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
