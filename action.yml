name: 'Cluster-Jekyll Site Builder'
description: 'Builds your Jekyll website in milliseconds using the compiled C++ Cluster compiler.'
author: 'cl-andro'
runs:
  using: 'composite'
  steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Cluster-Jekyll Container
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/github/workspace" \
          -w /github/workspace \
          ghcr.io/cl-andro/cluster-lang-release:latest
